# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "fca155aacecea599db1a9e2cc5b966fd"
application_url = "https://finey-store-manager.vercel.app"
embedded = true
name = "Finey Store Manager"

[access_scopes]
scopes = "read_products,write_products,read_collections,write_collections,read_metafields,write_metafields"

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://finey-store-manager.vercel.app/auth/callback", "https://finey-store-manager.vercel.app/auth/shopify/callback", "https://finey-store-manager.vercel.app/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
